# Builds the documentation site with Doxygen and deploys it to GitHub Pages.
#
# On pull requests the site is built only (a broken @ref, bad image path, or malformed markup fails
# the build, because the Doxyfile sets WARN_AS_ERROR=FAIL_ON_WARNINGS). Deployment happens only on a
# push to master. The runtime's correctness gates live in ci.yml; this workflow is docs-only.
name: docs

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

# Least privilege for the build job; the deploy job needs Pages + OIDC.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build docs (Doxygen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen
      - name: Build site
        # Doxygen only creates the final OUTPUT_DIRECTORY segment, not missing parents, and a fresh
        # checkout has no out/ — so create it first.
        run: mkdir -p out/docs && doxygen Doxyfile
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/docs/html

  deploy:
    name: deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
